name: Sondagem Esportes (Polymarket)

# Recon manual: descobre a estrutura de esportes da Polymarket para construir
# a captura de odds (abertura → hora a hora → dia do evento). Não grava nada.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sondar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar requests
        run: pip install requests

      - name: Rodar sondagem
        run: python -m futebol.probe
