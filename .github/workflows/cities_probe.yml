name: Sondagem Cidades de Temperatura (Polymarket)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sondar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar requests
        run: pip install requests

      - name: Rodar sondagem
        run: python cities_probe.py
