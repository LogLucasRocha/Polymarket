name: Previsão Tmax → Telegram

on:
  schedule:
    # Aos minutos :05 e :35 de toda hora (00:05, 00:35, 01:05…). Brasília é
    # UTC-3, então o minuto é o mesmo em UTC e BRT. Obs.: o cron do GitHub
    # pode atrasar alguns minutos em horários de pico.
    - cron: "5,35 * * * *"
  workflow_dispatch:        # permite rodar manualmente pelo botão "Run workflow"

# Evita duas execuções simultâneas se um agendamento atrasar.
concurrency:
  group: telegram-tmax
  cancel-in-progress: false

jobs:
  enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Enviar previsão pro Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POLYMARKET_WALLET: ${{ vars.POLYMARKET_WALLET }}
        run: python send_telegram.py
